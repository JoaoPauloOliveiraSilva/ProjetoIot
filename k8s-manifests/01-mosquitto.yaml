apiVersion: v1
kind: Secret
metadata:
  name: mosquitto-secret
  namespace: iot-surveillance
type: Opaque
stringData:
  username: iot
  password: iot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: iot-surveillance
data:
  mosquitto.conf: |
    listener 8883 0.0.0.0
    allow_anonymous false
    password_file /mosquitto/password/passwords
    cafile /mosquitto/tls/ca.crt
    certfile /mosquitto/tls/server.crt
    keyfile /mosquitto/tls/server.key
    tls_version tlsv1.2
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: iot-surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      initContainers:
      - name: init-password-file
        image: eclipse-mosquitto:2
        command:
        - sh
        - -c
        - mosquitto_passwd -b -c /mosquitto/password/passwords "$MQTT_USERNAME" "$MQTT_PASSWORD" && chmod 0644 /mosquitto/password/passwords
        env:
        - name: MQTT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mosquitto-secret
              key: username
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mosquitto-secret
              key: password
        volumeMounts:
        - name: password
          mountPath: /mosquitto/password
      - name: init-tls
        image: alpine:3.20
        command:
        - sh
        - -c
        - |
          apk add --no-cache openssl
          cat > /tmp/openssl.cnf <<'EOF'
          [req]
          distinguished_name=req_distinguished_name
          req_extensions=req_ext
          prompt=no
          [req_distinguished_name]
          CN=mosquitto-service
          [req_ext]
          subjectAltName=@alt_names
          [alt_names]
          DNS.1=mosquitto-service
          DNS.2=mosquitto
          DNS.3=localhost
          IP.1=127.0.0.1
          EOF
          openssl genrsa -out /mosquitto/tls/ca.key 2048
          openssl req -x509 -new -nodes -key /mosquitto/tls/ca.key -sha256 -days 3650 -subj "/CN=ProjetoIot MQTT CA" -out /mosquitto/tls/ca.crt
          openssl req -newkey rsa:2048 -nodes -keyout /mosquitto/tls/server.key -out /mosquitto/tls/server.csr -config /tmp/openssl.cnf
          openssl x509 -req -in /mosquitto/tls/server.csr -CA /mosquitto/tls/ca.crt -CAkey /mosquitto/tls/ca.key -CAcreateserial -out /mosquitto/tls/server.crt -days 3650 -sha256 -extfile /tmp/openssl.cnf -extensions req_ext
          chmod 0644 /mosquitto/tls/ca.crt /mosquitto/tls/server.crt /mosquitto/tls/server.key
        volumeMounts:
        - name: tls
          mountPath: /mosquitto/tls
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2
        ports:
        - containerPort: 8883
          name: mqtt
        readinessProbe:
          tcpSocket:
            port: 8883
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8883
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
          readOnly: true
        - name: password
          mountPath: /mosquitto/password
          readOnly: true
        - name: data
          mountPath: /mosquitto/data
        - name: tls
          mountPath: /mosquitto/tls
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
      - name: password
        emptyDir: {}
      - name: data
        emptyDir: {}
      - name: tls
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-service
  namespace: iot-surveillance
spec:
  type: NodePort
  ports:
    - name: mqtt
      port: 8883
      targetPort: 8883
      nodePort: 31883
  selector:
    app: mosquitto
