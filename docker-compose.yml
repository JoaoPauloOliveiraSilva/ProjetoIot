name: projeto-iot

services:
  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-admin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-uminho_mei}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-Iot}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-admin}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 10s
      timeout: 5s
      retries: 12

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:-iot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-iot}
    command: ["sh", "/usr/local/bin/mosquitto-auth-entrypoint"]
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./deploy/mosquitto/docker-entrypoint-auth.sh:/usr/local/bin/mosquitto-auth-entrypoint:ro
      - ./deploy/mosquitto/healthcheck.sh:/usr/local/bin/mosquitto-healthcheck:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/mosquitto-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: iot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-uminho_mei}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-Iot}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-admin}
      API_KEY_EDGE: ${API_KEY_EDGE:-iot}
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TLS_ENABLED: "false"
      MQTT_USERNAME: ${MQTT_USERNAME:-iot}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-iot}
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12

  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: iot-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  influxdb-data:
  mosquitto-data:
